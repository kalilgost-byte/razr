<div class="container">

<button class="next" onclick="changeSlide(1)">❯</button>

<input name="name" placeholder="الاسم و اللقب" required>
<input name="phone" type="tel" placeholder="رقم الهاتف" required>
<input name="wilaya" placeholder="الولاية" required>
<input name="commune" placeholder="البلدية" required>

</form>

</footer>

<script>

/* SLIDER */

let slideIndex = 0
const slides = document.querySelectorAll(".slide")

function showSlide(index){
slides.forEach(s => s.style.display="none")
slides[index].style.display="block"
}

function changeSlide(n){
slideIndex += n
if(slideIndex >= slides.length) slideIndex = 0
if(slideIndex < 0) slideIndex = slides.length - 1
showSlide(slideIndex)
}

function autoSlide(){
slideIndex++
if(slideIndex >= slides.length) slideIndex = 0
showSlide(slideIndex)
}

showSlide(slideIndex)
setInterval(autoSlide,3000)

/* FORM */

const scriptURL="https://script.google.com/macros/s/AKfycbxhv7Oxu7kDtE9hat_mRbjj2cJc1iEbuMtXWUGGXiMng9O_odIZ5xxTiqSAywamS-1E/exec"

const form=document.getElementById("orderForm")
const msg=document.getElementById("msg")
const button=document.getElementById("btn")

form.addEventListener("submit",async e=>{

e.preventDefault()

button.disabled=true
button.innerText="جاري الإرسال..."

try{

const response=await fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})

if(response.ok){

msg.innerHTML="✅ تم تسجيل طلبك بنجاح! سنتصل بك قريباً."
form.reset()

if(typeof ttq !== "undefined"){
ttq.track('CompletePayment',{
value:15000,
currency:'DZD',
content_name:'طابونة 5×1'
})
}

}else{
msg.innerHTML="❌ حدث خطأ في الإرسال."
}

}catch(error){
msg.innerHTML="❌ تحقق من اتصال الإنترنت."
}

button.disabled=false
button.innerText="اطلب الآن"

})

</script>
